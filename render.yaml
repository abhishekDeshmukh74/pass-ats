services:
  # ── Backend (FastAPI) ──────────────────────────────────
  - type: web
    name: pass-ats-api
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: apt-get install -y --no-install-recommends texlive-xetex texlive-fonts-recommended texlive-latex-recommended texlive-latex-extra texlive-fonts-extra && pip install -r backend/requirements.txt
    startCommand: bash backend/start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: GROQ_API_KEYS
        sync: false          # comma-separated Groq API keys
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MONGODB_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: LLM_PROVIDER
        value: groq
      - key: ALLOWED_ORIGINS
        sync: false          # set to your frontend URL after deploy

  # ── Frontend (React / Vite) ────────────────────────────
  - type: web
    name: pass-ats
    runtime: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://pass-ats-api.onrender.com/api/*
    envVars:
      - key: NODE_VERSION
        value: "20"
